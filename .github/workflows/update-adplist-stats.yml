name: Update ADPList Stats

on:
  schedule:
    - cron: '0 0 * * *' # Run every 24 hours (at midnight UTC)
  workflow_dispatch:     # Allow manual trigger

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run update script
        run: node scripts/update-adplist-stats.js

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/about/mentorship.md
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-update ADPList stats [skip ci]"
            git push
          else
            echo "No changes in ADPList stats."
          fi
